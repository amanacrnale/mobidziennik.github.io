<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>mobiDziennik</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#efefef;
}

/* LOGIN */

#loginScreen{
    width:100%;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:flex-start;
    padding-top:85px;
    background:#dcdcdc;
}

.login-panel{
    width:600px;
    background:#fff;
    border:1px solid #d0d0d0;
    border-radius:4px;
    box-shadow:0 1px 8px rgba(0,0,0,0.15);
    overflow:hidden;
}

.login-header{
    border-bottom:1px solid #e2e2e2;
    text-align:center;
    padding:18px 0 14px 0;
    background:#fff;
}

.mobid-logo{
    font-size:28px;
    font-weight:bold;
    color:#0d5d9c;
}

.mobid-logo span{
    color:#e5a032;
}

.mobid-logo sup{
    color:#999;
    font-size:12px;
    top:-10px;
    position:relative;
}

.login-body{
    display:grid;
    grid-template-columns:220px 1fr;
    gap:25px;
    padding:28px 34px 34px 34px;
    align-items:center;
}

.login-left{
    text-align:center;
}

.school-avatar{
    width:110px;
    height:110px;
    object-fit:cover;
    display:block;
    margin:0 auto 18px auto;
}

.school-name{
    font-size:16px;
    font-weight:bold;
    color:#222;
    line-height:1.3;
    text-align:left;
}

.login-right{
    width:100%;
}

.login-row{
    display:grid;
    grid-template-columns:100px 1fr;
    align-items:center;
    gap:14px;
    margin-bottom:14px;
}

.login-row label{
    font-size:16px;
    color:#333;
    text-align:right;
    font-weight:bold;
}

.login-row input{
    width:100%;
    height:34px;
    padding:6px 10px;
    border:1px solid #b7c3d0;
    border-radius:3px;
    background:#eef4fb;
    outline:none;
}

.login-row input:focus{
    border-color:#6ea7dd;
    box-shadow:0 0 4px rgba(80,140,210,0.35);
    background:#fff;
}

.login-main-btn{
    width:100%;
    height:38px;
    border:none;
    border-radius:4px;
    background:linear-gradient(#3f8dd3, #2167a8);
    color:#fff;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
    margin-top:2px;
    margin-bottom:12px;
}

.login-main-btn:hover{
    opacity:0.95;
}

.login-links{
    display:flex;
    justify-content:space-between;
    gap:10px;
    font-size:12px;
}

.login-links a{
    color:#4e83be;
    text-decoration:none;
}

.login-links a:hover{
    text-decoration:underline;
}

.message{
    text-align:center;
    color:red;
    margin-top:12px;
    min-height:18px;
    font-size:14px;
}

/* MAIN */

#mainPage{
    display:none;
}

/* TOPBAR */

}

.logo{
    font-size:32px;

}

.logo span{

}

#loggedUser{

    text-align:right;

/* NAVBAR */

.navbar{

    display:flex;
    gap:20px;

}

.navbar button{

    cursor:pointer;

}

/* CONTENT */

.page{

}

.active{

.box{

.lesson,

/* FORMS */

.small-info{

/* OCENY JAK W MOBIDZIENNIKU */

.grades-header{
    background:white;
    border-radius:10px;
    margin-top:15px;
    overflow:hidden;
    box-shadow:0 2px 5px rgba(0,0,0,0.08);
}

.student-name{
    padding:18px 20px;
    font-size:20px;

.subject-row{

.subject-row:last-child{

.subject-name{

.grade-tiles{
    display:flex;

.grade-tile{
    min-width:54px;
    height:54px;

    align-items:center;
    font-size:25px;
    font-weight:bold;
    color:#444;

}

.grade-tile sup{

.grade-green{ background:#55df5b; }

.grade-orange{ background:#ff8b35; }
.grade-yellow{ background:#f5dc51; }
.grade-red{ background:#ff5b70; }

/* UWAGI */

.note-card{
    display:flex;
    gap:15px;
    align-items:flex-start;
    padding:15px;
    margin-bottom:12px;
    border-radius:10px;
    border-left:7px solid #ccc;
    background:#fafafa;
}

.note-icon{
    width:48px;
    height:48px;
    border-radius:50%;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:28px;
    color:white;
    flex-shrink:0;
}

.note-positive{ border-left-color:#2ecc71; }
.note-positive .note-icon{ background:#2ecc71; }

.note-neutral{ border-left-color:#3498db; }
.note-neutral .note-icon{ background:#3498db; }

.note-negative{ border-left-color:#e74c3c; }
.note-negative .note-icon{ background:#e74c3c; }

.note-title{
    font-size:20px;
    font-weight:bold;
    margin-bottom:6px;
}

.note-text{
    font-size:18px;
    color:#444;
}

.delete-note-btn{
    margin-top:10px;
    padding:8px 12px;
    background:#e74c3c;
    color:white;
    border:none;
    border-radius:6px;
    cursor:pointer;
}

.delete-note-btn:hover{
    background:#c0392b;
}

/* HISTORIA */

function formatHistoryDay(timestamp){
    if(!timestamp){
        return "Bez daty";
    }

    return new Date(timestamp).toLocaleDateString("pl-PL", {
        weekday:"long",
        day:"numeric",
        month:"long",
        year:"numeric"
    });
}

function buildHistoryEntry(entry){
    if(entry.kind === "grade"){
        return `
            <div class="history-entry history-grade">
                <div class="history-left">
                    <div class="history-icon">📝</div>
                    <div class="history-label">OCENA</div>
                </div>
                <div class="history-right">
                    <div class="history-title">
                        ${entry.subject}: ${entry.grade}<sup>${entry.weight}</sup>
                    </div>
                    <div class="history-meta">
                        Wpisał nauczyciel: ${entry.teacher || "-"}<br>
                        Data wpisu: ${entry.date || "-"}
                    </div>
                </div>
            </div>
        `;
    }

    let noteClass = "history-note-negative";
    let icon = "❗";
    let noteTypeText = "negatywna";

    if(entry.type === "positive"){
        noteClass = "history-note-positive";
        icon = "✅";
        noteTypeText = "pozytywna";
    }

    if(entry.type === "neutral"){
        noteClass = "history-note-neutral";
        icon = "ℹ️";
        noteTypeText = "neutralna";
    }

    return `
        <div class="history-entry ${noteClass}">
            <div class="history-left">
                <div class="history-icon">${icon}</div>
                <div class="history-label">ZACHOWANIE</div>
            </div>
            <div class="history-right">
                <div class="history-text">${entry.text}</div>
                <div class="history-meta">
                    Rodzaj: ${noteTypeText}<br>
                    Wpisał nauczyciel: ${entry.author || "-"}<br>
                    Data wpisu: ${entry.date || "-"}
                </div>
            </div>
        </div>
    `;
}

function renderHistoryEntriesGrouped(entries){
    if(entries.length === 0){
        return `<div class="history-small-line">Brak wpisów.</div>`;
    }

    let html = "";
    let lastDay = "";

    entries.forEach(entry => {
        let currentDay = formatHistoryDay(entry.timestamp);

        if(currentDay !== lastDay){
            html += `<div class="history-day">Wpisane w dniu: ${currentDay}</div>`;
            lastDay = currentDay;
        }

        html += buildHistoryEntry(entry);
    });

    return html;
}

function loadHistory(username){
    let user = users[username];

    if(!user){
        document.getElementById("historyInfoBox").innerHTML = "";
        document.getElementById("historyBox").innerHTML = "Brak wpisów.";
        return;
    }

    let entries = [];

    (user.grades || []).forEach(item => {
        entries.push({
            kind:"grade",
            subject:item.subject || "",
            grade:item.grade || "",
            weight:item.weight || "1",
            teacher:item.teacher || "",
            date:item.date || "",
            timestamp:item.timestamp || 0
        });
    });

    (user.notes || []).forEach(item => {
        entries.push({
            kind:"note",
            type:item.type || "negative",
            text:item.text || "",
            author:item.author || "",
            date:item.date || "",
            timestamp:item.timestamp || 0
        });
    });

    entries.sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));

    let previousLoginRef = parseInt(localStorage.getItem("previousLoginRef_" + username) || "0", 10);
    let fourteenDaysAgo = Date.now() - (14 * 24 * 60 * 60 * 1000);

    let sinceLastLogin = [];
    let previous14Days = [];

    if(previousLoginRef > 0){
        sinceLastLogin = entries.filter(entry => (entry.timestamp || 0) > previousLoginRef);
        previous14Days = entries.filter(entry => {
            let t = entry.timestamp || 0;
            return t >= fourteenDaysAgo && t <= previousLoginRef;
        });
    }else{
        previous14Days = entries.filter(entry => (entry.timestamp || 0) >= fourteenDaysAgo);
    }

    let infoHtml = `
        <div class="history-small-line">
            ${sinceLastLogin.length === 0 ? "Brak wpisów od ostatniego logowania" : "Wpisy od ostatniego logowania"}
        </div>
        <div class="history-section-title">Wpisy z poprzednich 14 dni</div>
    `;

    document.getElementById("historyInfoBox").innerHTML = infoHtml;

    let mainHtml = "";

    if(sinceLastLogin.length > 0){
        mainHtml += renderHistoryEntriesGrouped(sinceLastLogin);
    }

    mainHtml += renderHistoryEntriesGrouped(previous14Days);

    document.getElementById("historyBox").innerHTML = mainHtml;
}

/* WIADOMOŚCI */

function fillMessageReceivers(loggedUser){
    let select = document.getElementById("messageReceiver");
    select.innerHTML = "";

    for(let login in users){
        if(login !== loggedUser){
            let option = document.createElement("option");
            option.value = login;
            option.innerText = login + " (" + users[login].role + ")";
            select.appendChild(option);
        }
    }
}

function loadMessages(username){
    let user = users[username];
    let html = "";

    if(user.messages.length === 0){
        html = "Brak wiadomości.";
    }else{
        user.messages.slice().reverse().forEach(item => {
            html += `
            <div class="chat-message">
                <b>Od: ${item.from}</b><br>
                ${item.text}<br>
                <span class="small-info">${item.date}</span>
            </div>
            `;
        });
    }

    document.getElementById("messagesBox").innerHTML = html;
}

function sendMessage(){
    let loggedUser = localStorage.getItem("loggedUser");
    let receiver = document.getElementById("messageReceiver").value;
    let text = document.getElementById("messageText").value.trim();

    if(text === ""){
        alert("Wpisz wiadomość.");
        return;
    }

    users[receiver].messages.push({
        from:loggedUser,
        text:text,
        date:new Date().toLocaleString("pl-PL")
    });

    saveUsers();

    document.getElementById("messageText").value = "";

    alert("Wiadomość wysłana!");
}

/* UPRAWNIENIA */

function canManage(){
    let loggedUser = localStorage.getItem("loggedUser");

    if(!loggedUser || !users[loggedUser]){
        return false;
    }

    return users[loggedUser].role === "teacher" || users[loggedUser].role === "admin";
}

/* ZMIANA STRON */

function showPage(pageId, savePage = true){
    let pages = document.querySelectorAll(".page");

    if(savePage){
        localStorage.setItem("lastPage", pageId);
    }

    pages.forEach(page => {
        page.classList.remove("active");
    });

    document.getElementById(pageId).classList.add("active");

    let loggedUser = localStorage.getItem("loggedUser");

    if(loggedUser && users[loggedUser]){
        loadLessons();

        if(canManage()){
            document.getElementById("gradesBox").style.display = "none";
            document.getElementById("notesBox").style.display = "none";
            document.getElementById("historyBox").style.display = "none";
        }else{
            document.getElementById("gradesBox").style.display = "block";
            document.getElementById("notesBox").style.display = "block";
            document.getElementById("historyBox").style.display = "block";
            loadGrades(loggedUser);
            loadNotes(loggedUser);
            loadHistory(loggedUser);
        }

        loadMessages(loggedUser);
    }
}

/* WYLOGUJ */

function logout(){
    localStorage.removeItem("loggedUser");
    localStorage.removeItem("lastPage");

    document.getElementById("mainPage").style.display = "none";
    document.getElementById("loginScreen").style.display = "flex";

    document.getElementById("username").value = "";
    document.getElementById("password").value = "";
    document.getElementById("message").innerText = "";
}

/* ENTER = ZALOGUJ */

document.getElementById("username").addEventListener("keydown", function(event){
    if(event.key === "Enter"){
        login();
    }
});

document.getElementById("password").addEventListener("keydown", function(event){
    if(event.key === "Enter"){
        login();
    }
});
