<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>mobiDziennik</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#efefef;
}

/* LOGIN */

#loginScreen{
    width:100%;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.login-box{
    width:350px;
    background:white;
    padding:30px;
    border-radius:12px;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
}

.login-box h1{
    text-align:center;
    color:#0072d6;
    margin-bottom:20px;
}

.login-box input{
    width:100%;
    padding:12px;
    margin-bottom:15px;
    border:1px solid #ccc;
    border-radius:8px;
}

.login-box button{
    width:100%;
    padding:12px;
    border:none;
    background:#0072d6;
    color:white;
    border-radius:8px;
    cursor:pointer;
    margin-bottom:10px;
}

.message{
    text-align:center;
    color:red;
}

/* MAIN */

#mainPage{
    display:none;
}

/* TOPBAR */

.topbar{
    background:#0b71c8;
    height:50px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:0 20px;
    color:white;
}

.logo{
    font-size:32px;
    font-weight:bold;
}

.logo span{
    color:yellow;
}

/* NAVBAR */

.navbar{
    background:#d8d8d8;
    padding:10px 20px;
    display:flex;
    gap:20px;
}

.navbar button{
    border:none;
    background:none;
    cursor:pointer;
    font-size:15px;
}

.navbar button:hover{
    color:#0072d6;
}

/* CONTENT */

.content{
    padding:30px;
}

.page{
    display:none;
}

.active{
    display:block;
}

.box{
    background:white;
    padding:20px;
    border-radius:10px;
    margin-top:15px;
}

.grade{
    font-size:22px;
    margin-bottom:10px;
}

/* TEACHER PANEL */

.teacher-panel{
    margin-top:20px;
}

.teacher-panel select,
.teacher-panel button{
    padding:10px;
    margin-right:10px;
    margin-top:10px;
}

.teacher-panel button{
    background:#0072d6;
    color:white;
    border:none;
    border-radius:6px;
    cursor:pointer;
}

</style>
</head>
<body>

<!-- LOGIN -->

<div id="loginScreen">

    <div class="login-box">

        <h1>mobiDziennik</h1>

        <input type="text"
               id="username"
               placeholder="Login">

        <input type="password"
               id="password"
               placeholder="Hasło">

        <button onclick="login()">
            Zaloguj się
        </button>

        <button onclick="register()">
            Zarejestruj się
        </button>

        <div class="message"
             id="message"></div>

    </div>

</div>

<!-- MAIN -->

<div id="mainPage">

    <div class="topbar">

        <div class="logo">
            mobi<span>Dziennik</span>
        </div>

        <div id="loggedUser"></div>

    </div>

    <div class="navbar">

        <button onclick="showPage('plan')">
            Plan lekcji
        </button>

        <button onclick="showPage('oceny')">
            Oceny
        </button>

        <button onclick="showPage('wiadomosci')">
            Wiadomości
        </button>

        <button onclick="logout()">
            Wyloguj
        </button>

    </div>

    <div class="content">

        <!-- PLAN -->

        <div id="plan"
             class="page active">

            <h1>Plan lekcji</h1>

            <div class="box">

                1. Matematyka<br><br>
                2. Polski<br><br>
                3. Angielski<br><br>
                4. Informatyka

            </div>

        </div>

        <!-- OCENY -->

        <div id="oceny"
             class="page">

            <h1>Oceny</h1>

            <div class="box"
                 id="gradesBox">

                Brak ocen

            </div>

            <!-- PANEL NAUCZYCIELA -->

            <div class="teacher-panel"
                 id="teacherPanel"
                 style="display:none;">

                <h2>Nowa ocena</h2>

                <!-- UCZEŃ -->

                <select id="studentSelect">

                    <option value="zanetka">
                        zanetka
                    </option>

                </select>

                <!-- PRZEDMIOT -->

                <select id="subjectSelect">

                    <option>Matematyka</option>
                    <option>Polski</option>
                    <option>Angielski</option>
                    <option>Informatyka</option>
                    <option>Chemia</option>
                    <option>Biologia</option>
                    <option>Historia</option>

                </select>

                <!-- OCENA -->

                <select id="gradeSelect">

                    <option>1</option>
                    <option>1+</option>
                    <option>1-</option>

                    <option>2</option>
                    <option>2+</option>
                    <option>2-</option>

                    <option>3</option>
                    <option>3+</option>
                    <option>3-</option>

                    <option>4</option>
                    <option>4+</option>
                    <option>4-</option>

                    <option>5</option>
                    <option>5+</option>
                    <option>5-</option>

                    <option>6</option>
                    <option>6-</option>

                </select>

                <button onclick="addGrade()">
                    Dodaj ocenę
                </button>

            </div>

        </div>

        <!-- WIADOMOŚCI -->

        <div id="wiadomosci"
             class="page">

            <h1>Wiadomości</h1>

            <div class="box">

                Nie masz nowych wiadomości.

            </div>

        </div>

    </div>

</div>

<script>

/* KONTA */

let users = JSON.parse(localStorage.getItem("users")) || {

    "jhjkls":{
        password:"szkoła123",
        role:"teacher",
        grades:[]
    },

    "zanetka":{
        password:"chemia",
        role:"student",
        grades:[]
    }

};

/* ZAPIS */

function saveUsers(){

    localStorage.setItem(
        "users",
        JSON.stringify(users)
    );

}

/* REJESTRACJA */

function register(){

    let username =
    document.getElementById("username").value;

    let password =
    document.getElementById("password").value;

    if(users[username]){

        document.getElementById("message").innerText =
        "Takie konto już istnieje";

        return;

    }

    users[username] = {

        password:password,
        role:"student",
        grades:[]

    };

    saveUsers();

    document.getElementById("message").innerText =
    "Konto utworzone!";

}

/* LOGIN */

function login(){

    let username =
    document.getElementById("username").value;

    let password =
    document.getElementById("password").value;

    if(users[username] &&
       users[username].password === password){

        localStorage.setItem(
            "loggedUser",
            username
        );

        openAccount(username);

    }else{

        document.getElementById("message").innerText =
        "Zły login lub hasło";

    }

}

/* OTWÓRZ KONTO */

function openAccount(username){

    document.getElementById("loginScreen")
    .style.display = "none";

    document.getElementById("mainPage")
    .style.display = "block";

    document.getElementById("loggedUser")
    .innerText =
    "Zalogowano jako: " + username;

    let user = users[username];

    loadGrades(username);

    if(user.role === "teacher"){

        document.getElementById("teacherPanel")
        .style.display = "block";

    }else{

        document.getElementById("teacherPanel")
        .style.display = "none";

    }

}

/* WCZYTAJ OCENY */

function loadGrades(username){

    let user = users[username];

    let html = "";

    if(user.grades.length === 0){

        html = "Brak ocen";

    }else{

        user.grades.forEach(item => {

            html += `
            <div class="grade">
                <b>${item.subject}</b>: ${item.grade}
            </div>
            `;

        });

    }

    document.getElementById("gradesBox")
    .innerHTML = html;

}

/* DODAJ OCENĘ */

function addGrade(){

    let student =
    document.getElementById("studentSelect").value;

    let subject =
    document.getElementById("subjectSelect").value;

    let grade =
    document.getElementById("gradeSelect").value;

    users[student].grades.push({

        subject:subject,
        grade:grade

    });

    saveUsers();

    alert("Dodano ocenę!");

}

/* ZMIANA STRON */

function showPage(pageId){

    let pages =
    document.querySelectorAll(".page");

    pages.forEach(page => {

        page.classList.remove("active");

    });

    document.getElementById(pageId)
    .classList.add("active");

}

/* WYLOGUJ */

function logout(){

    localStorage.removeItem("loggedUser");

    document.getElementById("mainPage")
    .style.display = "none";

    document.getElementById("loginScreen")
    .style.display = "flex";

    document.getElementById("username").value = "";
    document.getElementById("password").value = "";
    document.getElementById("message").innerText = "";

}

/* AUTO LOGIN */

let loggedUser =
localStorage.getItem("loggedUser");

if(loggedUser && users[loggedUser]){

    openAccount(loggedUser);

}

saveUsers();

</script>

</body>
</html>
