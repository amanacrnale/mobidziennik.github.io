<body>

<!-- LOGIN -->

<div id="loginScreen">

    <div class="login-box">

        <h1>mobiDziennik</h1>

        <input type="text" id="username" placeholder="Login">

        <input type="password" id="password" placeholder="Hasło">

        <button onclick="login()">Zaloguj się</button>

        <button onclick="register()">Zarejestruj się</button>

        <div class="message" id="message"></div>

    </div>

</div>

<!-- MAIN -->

<div id="mainPage">

    <div class="topbar">
        <div class="logo">mobi<span>Dziennik</span></div>

        <div class="user" id="loggedUser"></div>
    </div>

    <div class="navbar">
        <button onclick="showPage('plan')">Plan lekcji</button>
        <button onclick="showPage('oceny')">Oceny</button>
        <button onclick="showPage('wiadomosci')">Wiadomości</button>
        <button onclick="showPage('logout')">Wyloguj</button>
    </div>

    <div class="content">

        <!-- PLAN -->

        <div id="plan" class="page active">
            <h1>Plan lekcji</h1>

            <div class="box">
                1. Matematyka<br><br>
                2. Polski<br><br>
                3. Angielski<br><br>
                4. Informatyka
            </div>
        </div>

        <!-- OCENY -->

        <div id="oceny" class="page">

            <h1>Oceny</h1>

            <div class="box" id="gradesBox">
                Brak ocen
            </div>

            <!-- PANEL NAUCZYCIELA -->

            <div class="teacher-panel" id="teacherPanel" style="display:none;">

                <h2>Panel nauczyciela</h2><br>

                <input type="text" id="studentName" placeholder="Login ucznia">

                <input type="text" id="newGrade" placeholder="Ocena">

                <button onclick="addGrade()">
                    Dodaj ocenę
                </button>

            </div>

        </div>

        <!-- WIADOMOSCI -->

        <div id="wiadomosci" class="page">

            <h1>Wiadomości</h1>

            <div class="box">
                Nie masz nowych wiadomości.
            </div>

        </div>

    </div>

</div>

<script>

/* DOMYŚLNE KONTA */

let users = JSON.parse(localStorage.getItem("users")) || {

    "jhjkls":{
        password:"szkoła123",
        role:"teacher",
        grades:[]
    },

    "zanetka":{
        password:"chemia",
        role:"student",
        grades:["5 z matematyki"]
    }

};

/* ZAPIS */

function saveUsers(){
    localStorage.setItem("users", JSON.stringify(users));
}

/* REJESTRACJA */

function register(){

    let username = document.getElementById("username").value;
    let password = document.getElementById("password").value;

    if(users[username]){
        document.getElementById("message").innerText =
        "Takie konto już istnieje";
        return;
    }

    users[username] = {
        password:password,
        role:"student",
        grades:[]
    };

    saveUsers();

    document.getElementById("message").innerText =
    "Konto utworzone!";
}

/* LOGIN */

function login(){

    let username = document.getElementById("username").value;
    let password = document.getElementById("password").value;

    if(users[username] &&
       users[username].password === password){

        localStorage.setItem("loggedUser", username);

        openAccount(username);

    }else{

        document.getElementById("message").innerText =
        "Zły login lub hasło";

    }

}

/* OTWORZ KONTO */

function openAccount(username){

    document.getElementById("loginScreen").style.display =
    "none";

    document.getElementById("mainPage").style.display =
    "block";

    document.getElementById("loggedUser").innerText =
    "Zalogowano jako: " + username;

    let user = users[username];

    /* OCENY */

    let gradesHTML = "";

    if(user.grades.length === 0){

        gradesHTML = "Brak ocen";

    }else{

        user.grades.forEach(g => {
            gradesHTML += g + "<br><br>";
        });

    }

    document.getElementById("gradesBox").innerHTML =
    gradesHTML;

    /* PANEL NAUCZYCIELA */

    if(user.role === "teacher"){

        document.getElementById("teacherPanel").style.display =
        "block";

    }else{

        document.getElementById("teacherPanel").style.display =
        "none";

    }

}

/* ZMIANA STRON */

function showPage(pageId){

    if(pageId === "logout"){

        localStorage.removeItem("loggedUser");

        location.reload();

        return;
    }

    let pages = document.querySelectorAll(".page");

    pages.forEach(page => {
        page.classList.remove("active");
    });

    document.getElementById(pageId).classList.add("active");

}

/* DODAJ OCENĘ */

function addGrade(){

    let student =
    document.getElementById("studentName").value;

    let grade =
    document.getElementById("newGrade").value;

    if(users[student]){

        users[student].grades.push(grade);

        saveUsers();

        alert("Dodano ocenę!");

    }else{

        alert("Nie znaleziono ucznia");

    }

}

/* AUTOMATYCZNE LOGOWANIE */

let loggedUser = localStorage.getItem("loggedUser");

if(loggedUser && users[loggedUser]){

    openAccount(loggedUser);

}

saveUsers();

</script>

</body>
</html>
