
<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>mobiDziennik</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,Helvetica,sans-serif}
body{background:#efefef}

#loginScreen{width:100%;min-height:100vh;display:flex;justify-content:center;align-items:flex-start;padding-top:85px;background:#dcdcdc}
.login-panel{width:600px;background:#fff;border:1px solid #d0d0d0;border-radius:4px;box-shadow:0 1px 8px rgba(0,0,0,.15);overflow:hidden}
.login-header{border-bottom:1px solid #e2e2e2;text-align:center;padding:18px 0 14px;background:#fff}
.mobid-logo{font-size:28px;font-weight:bold;color:#0d5d9c}
.mobid-logo span{color:#e5a032}
.mobid-logo sup{color:#999;font-size:12px;position:relative;top:-10px}
.login-body{display:grid;grid-template-columns:220px 1fr;gap:25px;padding:28px 34px 34px;align-items:center}
.login-left{text-align:center}
.school-avatar{width:110px;height:110px;object-fit:cover;display:block;margin:0 auto 18px}
.school-name{font-size:16px;font-weight:bold;color:#222;line-height:1.3;text-align:left}
.login-row{display:grid;grid-template-columns:100px 1fr;align-items:center;gap:14px;margin-bottom:14px}
.login-row label{font-size:16px;color:#333;text-align:right;font-weight:bold}
.login-row input{width:100%;height:34px;padding:6px 10px;border:1px solid #b7c3d0;border-radius:3px;background:#eef4fb;outline:none}
.login-row input:focus{border-color:#6ea7dd;background:#fff}
.login-main-btn{width:100%;height:38px;border:none;border-radius:4px;background:linear-gradient(#3f8dd3,#2167a8);color:white;font-size:16px;font-weight:bold;cursor:pointer;margin:2px 0 12px}
.login-links{display:flex;justify-content:space-between;gap:10px;font-size:12px}
.login-links a{color:#4e83be;text-decoration:none}
.message{text-align:center;color:red;margin-top:12px;min-height:18px;font-size:14px}

#mainPage{display:none}
.topbar{background:#0b71c8;min-height:50px;display:flex;justify-content:space-between;align-items:center;padding:0 20px;color:white;gap:10px}
.logo{font-size:32px;font-weight:bold}
.logo span{color:yellow}
#loggedUser{font-size:14px;text-align:right}
.navbar{background:#d8d8d8;padding:10px 20px;display:flex;gap:20px;flex-wrap:wrap}
.navbar button{border:none;background:none;cursor:pointer;font-size:15px;color:#0072d6;background:transparent}
.content{padding:30px}
.page{display:none}
.active{display:block}
.box{background:white;padding:20px;border-radius:10px;margin-top:15px;box-shadow:0 2px 5px rgba(0,0,0,.08)}
.lesson,.chat-message{font-size:18px;margin-bottom:12px;padding:10px;border-bottom:1px solid #eee}
.panel{margin-top:20px;background:white;padding:20px;border-radius:10px;box-shadow:0 2px 5px rgba(0,0,0,.08)}
.panel h2{margin-bottom:10px}
.panel input,.panel select,.panel textarea,.panel button{padding:10px;margin-right:10px;margin-top:10px}
.panel input,.panel select,.panel textarea{border:1px solid #ccc;border-radius:6px}
.panel textarea{width:100%;min-height:90px;resize:vertical}
.panel button{background:#0072d6;color:white;border:none;border-radius:6px;cursor:pointer}
.panel button:disabled{background:#999}
.small-info{font-size:13px;color:#666;margin-top:8px}
.upload-info{font-size:14px;color:#0b71c8;margin-top:8px;font-weight:bold}

.attachment-card{margin-top:12px;border:1px solid #ccc;border-radius:8px;padding:10px;background:#f9f9f9}
.image-preview{max-width:100%;max-height:420px;border-radius:8px;margin-top:8px;border:1px solid #bbb;display:block}
.attachment-actions{margin-top:8px;display:flex;gap:10px;flex-wrap:wrap}
.attachment-actions a{padding:8px 12px;background:#0072d6;color:white;border-radius:6px;text-decoration:none;font-weight:bold}

.grades-header{background:white;border-radius:10px;margin-top:15px;overflow:hidden;box-shadow:0 2px 5px rgba(0,0,0,.08)}
.student-name{padding:18px 20px;font-size:20px;font-weight:bold;color:#555;border-bottom:1px solid #eee}
.subject-row{display:grid;grid-template-columns:160px 1fr;align-items:center;min-height:78px;border-bottom:1px solid #eee;background:white}
.subject-name{padding:18px 20px;font-size:20px;color:#666}
.grade-tiles{display:flex;flex-wrap:wrap;gap:6px;padding:12px}
.grade-tile{min-width:54px;height:54px;border-radius:6px;display:flex;justify-content:center;align-items:center;font-size:25px;font-weight:bold;color:#444;box-shadow:0 1px 3px rgba(0,0,0,.15);position:relative}
.grade-tile sup{font-size:13px;margin-left:1px;transform:translateY(-7px)}
.grade-tile-manage{padding-bottom:16px}
.delete-grade-btn{position:absolute;bottom:2px;left:50%;transform:translateX(-50%);font-size:10px;padding:1px 5px;border:none;border-radius:4px;background:rgba(0,0,0,.55);color:white;cursor:pointer}
.grade-green{background:#55df5b}
.grade-blue{background:#46bedb}
.grade-orange{background:#ff8b35}
.grade-yellow{background:#f5dc51}
.grade-red{background:#ff5b70}
.grade-purple{background:#c9c9ee}
.grade-mint{background:#9ee5cf}
.grade-gray{background:#e8e8d8}
.grade-pinkgray{background:#c8b2b5}

.note-card{display:flex;gap:15px;align-items:flex-start;padding:15px;margin-bottom:12px;border-radius:10px;border-left:7px solid #ccc;background:#fafafa}
.note-icon{width:48px;height:48px;border-radius:50%;display:flex;justify-content:center;align-items:center;font-size:28px;color:white;flex-shrink:0}
.note-positive{border-left-color:#2ecc71}
.note-positive .note-icon{background:#2ecc71}
.note-neutral{border-left-color:#3498db}
.note-neutral .note-icon{background:#3498db}
.note-negative{border-left-color:#e74c3c}
.note-negative .note-icon{background:#e74c3c}
.note-title{font-size:20px;font-weight:bold;margin-bottom:6px}
.note-text{font-size:18px;color:#444}
.delete-note-btn{margin-top:10px;padding:8px 12px;background:#e74c3c;color:white;border:none;border-radius:6px;cursor:pointer}

.history-top-title{text-align:center;font-size:28px;color:#0072d6;margin-bottom:18px}
.history-small-line{font-size:13px;color:#555;margin:6px 0;padding-left:4px}
.history-section-title{font-size:13px;color:#444;font-weight:bold;margin:14px 0 8px;padding-left:4px}
.history-day{font-size:18px;font-weight:bold;color:#111;margin:25px 0 12px;border-bottom:1px solid #cfcfcf;padding:0 0 10px 50px}
.history-entry{display:grid;grid-template-columns:110px 1fr;background:white;border:1px solid #d0d0d0;margin-bottom:14px}
.history-left{border-right:1px solid #d0d0d0;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:12px 8px;background:#fafafa;text-align:center}
.history-icon{font-size:34px;margin-bottom:8px}
.history-label{font-size:14px;font-weight:bold;color:#111}
.history-right{padding:14px}
.history-title{font-size:18px;font-weight:bold;color:#111;margin-bottom:8px}
.history-text{font-size:17px;color:#222;line-height:1.45;margin-bottom:8px;font-weight:bold}
.history-meta{font-size:14px;color:#555}
.history-grade{background:#eaf5ff}
.history-note-positive{background:#f1fff4}
.history-note-neutral{background:#f4faff}
.history-note-negative{background:#fffafa}

@media(max-width:700px){
    #loginScreen{padding:20px 10px}
    .login-panel{width:100%}
    .login-body{grid-template-columns:1fr;padding:20px}
    .school-name{text-align:center}
    .login-row{grid-template-columns:1fr;gap:6px}
    .login-row label{text-align:left}
    .login-links{flex-direction:column;gap:6px}
    .content{padding:0}
    .content h1{padding:18px 15px 0}
    .box,.panel,.grades-header{border-radius:0;margin-top:0}
    .subject-row{grid-template-columns:145px 1fr
